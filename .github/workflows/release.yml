name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.25]
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            suffix: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="scc-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}"
          go build -v -o "dist/$BINARY_NAME" .

      - name: Upload Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  publish-release:
    name: Publish Nightly Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Nightly Release
        uses: ncipollo/release-action@v1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          artifacts: "dist/*"
          body: |
            This is an automated build generated from the latest commit on the master branch.
            
            **Last Updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** [${{ github.sha }}](${{ github.event.head_commit.url }})
          name: "Nightly Build"
          tag: "nightly"
          prerelease: true
