name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        go-version: [1.25]
        exclude:
          - os: windows
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          # Dynamically append .exe inside the shell execution logic if it's Windows
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXTENSION=".exe"
          else
            EXTENSION=""
          fi
          
          BINARY_NAME="scc-${{ matrix.os }}-${{ matrix.arch }}${EXTENSION}"
          go build -v -o "dist/$BINARY_NAME" .

      - name: Upload Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  publish-release:
    name: Publish Nightly Release
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update Nightly Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "dist/*"
          body: |
            This is an automated build generated from the latest commit on the master branch.
            
            **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Triggered By:** ${{ github.actor }} via ${{ github.event_name }}
          name: "Nightly Build"
          tag: "nightly"
          prerelease: true
